<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تيتان كلاود | المنصة الرسمية</title>
    <style>
        :root { --main: #00f2ff; --bg: #050505; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }
        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--main); background: #000; box-shadow: 0 0 20px var(--main); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 25px; }
        .card { background: #111; border-radius: 15px; border: 1px solid #222; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--main); transform: scale(1.03); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .p-btn { background: var(--main); color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        #gameArea { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        .btn-ui { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; backdrop-filter: blur(5px); }
    </style>
</head>
<body>
    <header><h1>شركة تيتان للألعاب السحابية</h1></header>
    <div class="grid" id="catalog"></div>
    <div id="gameArea">
        <iframe id="screen"></iframe>
        <div class="controls">
            <div class="btn-ui">D-PAD</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div class="btn-ui" style="color:yellow">Y</div><div class="btn-ui" style="color:blue">X</div>
                <div class="btn-ui" style="color:red">B</div><div class="btn-ui" style="color:green">A</div>
            </div>
        </div>
        <button onclick="location.reload()" style="position:fixed; top:20px; left:20px; background:red; color:white; border:none; padding:12px; border-radius:8px; z-index:2000; font-weight:bold;">إغلاق اللعبة</button>
    </div>
    <script>
        const data = [
            {t:"GTA V ONLINE", i:"https://images.alphacoders.com/125/1250325.jpg", u:"https://www.retrogames.cc/embed/40238-tekken-3.html"},
            {t:"SPIDER-MAN PRO", i:"https://images8.alphacoders.com/105/1058032.jpg", u:"https://www.retrogames.cc/embed/10042-street-fighter-ii.html"},
            {t:"FIFA 25 CLOUD", i:"https://images5.alphacoders.com/132/1327178.jpeg", u:"https://www.retrogames.cc/embed/18855-sonic-advance.html"}
        ];
        const list = document.getElementById('catalog');
        data.forEach(g => {
            list.innerHTML += `<div class="card"><img src="${g.i}"><div style="padding:15px"><h3>${g.t}</h3></div><button class="p-btn" onclick="openG('${g.u}')">بدء اللعب</button></div>`;
        });
        function openG(link) {
            document.getElementById('screen').src = link;
            document.getElementById('gameArea').style.display = 'block';
            setInterval(() => { alert("إعلان تجاري - لدعم سيرفرات TITAN"); }, 180000);
        }
    </script>
</body>
</html>
